<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StockThink — free chess game analysis in your browser. Paste a PGN, get a full chess.com-style game review powered by Stockfish." />
    <title>StockThink — Free Chess Game Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Critical pre-app styles: dark canvas, no flash of white */
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #262421; color: #f5f4f0; }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span class="wordmark">StockTh<span class="wordmark-dot"></span>nk</span>
        <span class="tagline">free in-browser game review</span>
      </header>

      <section id="screen-input" class="screen">
        <h1>Game Review</h1>
        <p class="hint">Paste a PGN (chess.com / lichess export) and let Stockfish 18 review every move — entirely in your browser.</p>
        <textarea id="pgn-input" spellcheck="false" placeholder='[Event "..."]&#10;&#10;1. e4 e5 2. Nf3 ...'></textarea>
        <div class="row">
          <label class="tier-label">Engine time
            <select id="tier">
              <option value="fast">Fast (75k nodes/move)</option>
              <option value="standard" selected>Standard (200k nodes/move)</option>
              <option value="deep">Deep (500k nodes/move)</option>
            </select>
          </label>
          <button id="analyze-btn" class="primary">Analyze game</button>
        </div>
        <p id="input-error" class="error hidden"></p>
      </section>

      <section id="screen-progress" class="screen hidden">
        <h1>Analyzing…</h1>
        <div class="progress-track"><div id="progress-fill"></div></div>
        <p id="progress-text">Starting engines…</p>
      </section>

      <section id="screen-review" class="screen hidden">
        <div class="review-layout">
          <div class="board-zone">
            <div id="eval-bar"><div class="white-fill"></div><span class="eval-label">0.0</span></div>
            <div class="board-col">
              <div class="player-bar" id="player-top"></div>
              <div id="board" class="board"></div>
              <div class="player-bar" id="player-bottom"></div>
            </div>
          </div>
          <aside class="sidebar">
            <div id="summary"></div>
            <div id="coach"></div>
            <div id="moves" class="moves-scroll"></div>
            <div id="graph"></div>
            <div id="deep-review"></div>
            <div class="controls">
              <button id="btn-start" title="Start of game (Home)" aria-label="Start of game">
                <svg viewBox="0 0 24 24"><path d="M7 6v12"/><path d="M18 7l-6 5 6 5"/></svg>
              </button>
              <button id="btn-prev" title="Previous move (←)" aria-label="Previous move">
                <svg viewBox="0 0 24 24"><path d="M14.5 6.5 9 12l5.5 5.5"/></svg>
              </button>
              <button id="btn-next" class="nav-primary" title="Next move (→)" aria-label="Next move">
                <svg viewBox="0 0 24 24"><path d="M9.5 5.5 16 12l-6.5 6.5"/></svg>
              </button>
              <button id="btn-end" title="End of game (End)" aria-label="End of game">
                <svg viewBox="0 0 24 24"><path d="M6 7l6 5-6 5"/><path d="M17 6v12"/></svg>
              </button>
              <span class="controls-gap"></span>
              <button id="btn-flip" title="Flip board (f)" aria-label="Flip board">
                <svg viewBox="0 0 24 24"><path d="M8 7v10M8 17l-3-3M8 17l3-3"/><path d="M16 17V7M16 7l-3 3M16 7l3 3"/></svg>
              </button>
              <button id="btn-new" title="Review another game">New</button>
            </div>
          </aside>
        </div>
      </section>

      <footer class="footer">
        <span>Runs 100% in your browser · Stockfish 18 Lite (GPL) · openings CC0 lichess · pieces © Chess.com (Neo)</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

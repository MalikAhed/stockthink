name: Release

# Cut a release by pushing a version tag:
#   npm version patch|minor|major   # bumps package.json + creates vX.Y.Z tag
#   git push --follow-tags
# GitHub Pages still deploys from main (see deploy.yml); this only publishes
# a Release with auto-generated notes for the tag.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Lens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  /* chess.com slate palette */
  --bg-canvas:#262421; --bg-surface:#312E2B; --bg-surface-2:#3C3936; --bg-surface-3:#4A4744;
  --bg-bubble:#F1F0EE;
  --border-subtle:rgba(255,255,255,0.05); --border-default:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
  --text-primary:#F5F4F0; --text-secondary:#B8B3A8; --text-tertiary:#7A7670; --text-disabled:#4F4C47;
  --text-on-bubble:#3D3936; --text-on-bubble-2:#5C5854;
  --green-200:#C6E099; --green-400:#94C455; --green-500:#81B64C; --green-glow:rgba(129,182,76,0.32);
  --btn-secondary-bg:#3C3936;
  --sp1:4px;--sp2:8px;--sp3:12px;--sp4:16px;--sp5:20px;--sp6:24px;--sp8:32px;
  --r-sm:8px;--r-md:12px;--r-lg:14px;--r-xl:18px;--r-full:9999px;
  --shadow-sm:0 1px 0 rgba(255,255,255,0.04) inset,0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:0 1px 0 rgba(255,255,255,0.05) inset,0 4px 14px rgba(0,0,0,0.45);
  --shadow-glow:0 0 0 4px rgba(129,182,76,0.16),0 8px 24px -4px rgba(129,182,76,0.4);
  /* chess.com board: light #EBECD0 / dark #739552 */
  --board-light:#EBECD0; --board-dark:#739552;
  --board-lm-light:#F6F669; --board-lm-dark:#BACA44;
  --font-sans:'Plus Jakarta Sans',system-ui,sans-serif; --font-mono:'JetBrains Mono',monospace;
  --ease-out:cubic-bezier(0.2,0.8,0.2,1); --ease-over:cubic-bezier(0.34,1.56,0.64,1);
  /* chess.com classification colors (matched to badge art) */
  --cl-brilliant:#26C2A3;--cl-great:#5C8BB0;--cl-best:#95B776;--cl-excellent:#95B776;
  --cl-good:#95AF7A;--cl-book:#A88865;--cl-forced:#7C9C7B;--cl-inaccuracy:#F7C045;
  --cl-mistake:#E58F2A;--cl-blunder:#CA3431;--cl-missed-win:#FF7769;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg-canvas);color:var(--text-primary);
  font-family:var(--font-sans);font-size:15px;line-height:22px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg-surface-3);border-radius:var(--r-full);}
button{border:none;background:none;color:inherit;font:inherit;cursor:pointer;}
.tabular{font-variant-numeric:tabular-nums;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── HEADER ── */
#header{
  height:56px;min-height:56px;background:var(--bg-canvas);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp6);
}
.wordmark{font-size:16px;font-weight:700;display:flex;align-items:center;gap:2px;user-select:none;}
.wordmark-dot{width:6px;height:6px;background:var(--green-500);border-radius:3px;display:inline-block;margin-bottom:6px;}
#match-strip{display:flex;align-items:center;gap:var(--sp2);font-size:13px;}
.strip-pill{width:26px;height:26px;border-radius:var(--r-full);background:var(--bg-surface-2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-secondary);}
.strip-name{font-weight:600;}
.strip-rating{font-size:11px;color:var(--text-tertiary);}
.strip-result{background:var(--bg-surface-2);border-radius:var(--r-md);padding:2px 8px;
  font-family:var(--font-mono);font-size:12px;font-weight:600;margin:0 var(--sp1);}
#header-btns{display:flex;gap:var(--sp2);}
.icon-btn{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);transition:background 120ms,color 120ms;}
.icon-btn:hover{background:var(--bg-surface-2);color:var(--text-primary);}
.icon-btn svg{width:18px;height:18px;pointer-events:none;}

/* ── MAIN GRID — chess.com analysis layout ── */
/* body is a 4-col grid: [1fr][board:min-content][sidebar:30-50rem][1fr]
   row 1 (top) is the board's full height; row 2 (bottom) is eval graph + nav.
   sidebar spans both rows. */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:[board-layout] 1fr [sidebar] 460px;
  grid-template-rows:1fr;
  column-gap:8px;
  padding:6px 8px 8px 8px;
  overflow:hidden;
}
#col-drag{display:none;}
#resize-handle{display:none;}

/* ── BOARD COLUMN (chess.com .board-layout-main) ── */
#board-stage{
  grid-column:board-layout;grid-row:1;
  display:flex;flex-direction:column;
  width:100%;margin:0;
  align-items:center;
  justify-content:center;
  min-height:0;
  gap:4px;
}

/* Player strips — flat, chess.com style */
.player-strip{
  height:44px;min-height:44px;
  background:transparent;
  display:flex;align-items:center;gap:10px;padding:0 0;
  position:relative;flex-shrink:0;
  width:100%;max-width:calc(var(--board-size, 480px) + 26px);
}
.player-strip::before{
  content:'';position:absolute;left:-6px;top:8px;bottom:8px;width:3px;
  border-radius:var(--r-full);background:var(--green-500);opacity:0;
  transition:opacity 240ms var(--ease-out);
}
.player-strip.active::before{opacity:1;}
.player-avatar{width:32px;height:32px;border-radius:6px;background:var(--bg-surface-2);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:var(--text-secondary);flex-shrink:0;}
.player-info{flex:1;display:flex;align-items:baseline;gap:6px;min-width:0;}
.player-name{font-size:15px;font-weight:600;color:var(--text-primary);}
.player-rating{font-size:12px;color:var(--text-tertiary);font-family:var(--font-mono);}
.acc-badge{display:none!important;}

/* Board + eval row — fills remaining height */
#board-and-eval{
  display:flex;align-items:stretch;flex:0 0 auto;gap:8px;
}
#eval-bar{
  width:18px;flex-shrink:0;border-radius:var(--r-sm);
  overflow:hidden;background:#1A1A1A;position:relative;
  box-shadow:var(--shadow-sm);align-self:stretch;
}
#eval-bar-fill{position:absolute;bottom:0;left:0;right:0;background:#F0F0F0;
  transition:height 400ms var(--ease-over);}
#eval-bar-tick{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,0.16);}
#eval-bar-label{
  position:absolute;left:-2px;right:-2px;font-family:var(--font-mono);font-size:9px;font-weight:700;
  text-align:center;pointer-events:none;padding:2px 0;letter-spacing:-0.02em;
  transition:top 400ms var(--ease-over),color 400ms;
}

/* Chess board */
#board-wrap{
  flex-shrink:0;border-radius:var(--r-sm);
  box-shadow:var(--shadow-md);
  overflow:hidden;position:relative;
}
#board-grid{
  display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
  width:100%;height:100%;
}
.board-sq{display:flex;align-items:center;justify-content:center;position:relative;}
.sq-light{background:var(--board-light);}
.sq-dark{background:var(--board-dark);}
/* Chess.com bright-yellow last-move highlight */
.sq-light.lm{background:var(--board-lm-light);}
.sq-dark.lm{background:var(--board-lm-dark);}
.sq-check{background:radial-gradient(ellipse at center,rgba(213,51,51,0.88) 0%,rgba(213,51,51,0.2) 65%,transparent 100%) !important;}

/* SVG sprite pieces — loaded from chess.com CDN at runtime */
.piece{
  width:100%;height:100%;
  background-repeat:no-repeat;background-size:100% 100%;background-position:center;
  user-select:none;pointer-events:none;
}

/* Coordinates */
.coord-r{position:absolute;top:2px;left:2px;font-family:var(--font-mono);font-size:9px;font-weight:600;line-height:1;pointer-events:none;z-index:2;}
.coord-f{position:absolute;bottom:2px;right:2px;font-family:var(--font-mono);font-size:9px;font-weight:600;line-height:1;pointer-events:none;z-index:2;}
.sq-light .coord-r,.sq-light .coord-f{color:var(--board-dark);}
.sq-dark  .coord-r,.sq-dark  .coord-f{color:var(--board-light);}
.sq-light.lm .coord-r,.sq-light.lm .coord-f{color:#A29A4F;}
.sq-dark.lm  .coord-r,.sq-dark.lm  .coord-f{color:#F6F6C3;}

/* ── REVIEW PANEL ── (chess.com .board-layout-sidebar) */
#review-panel{
  grid-column:sidebar;grid-row:1;
  display:flex;flex-direction:column;gap:0;
  overflow:hidden;min-height:0;min-width:0;
  height:100%;
  background:var(--bg-surface);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-sm);
  padding:6px;
}

/* Panel header (fixed) */
.panel-header{
  height:34px;min-height:34px;display:flex;align-items:center;justify-content:center;
  padding:0 var(--sp3);flex-shrink:0;gap:var(--sp2);
  border-bottom:1px solid var(--border-subtle);margin-bottom:4px;
}
.panel-title{font-size:13px;font-weight:700;color:var(--text-primary);letter-spacing:.01em;
  display:flex;align-items:center;gap:6px;}
.panel-title svg{width:16px;height:16px;color:var(--green-500);}

/* Section 1: Coach commentary */
#sec-explain{
  flex:4 1 0;min-height:120px;overflow:hidden;
  display:flex;flex-direction:column;position:relative;
}
/* Section 2: Move list — dominant section */
#sec-moves{
  flex:6 1 0;min-height:80px;overflow:hidden;
  display:flex;flex-direction:column;
  border-top:1px solid var(--border-subtle);margin-top:4px;padding-top:4px;
}
/* Section 3: Graph + nav */
#sec-graph-nav{
  flex:0 0 auto;display:flex;flex-direction:column;gap:4px;
  border-top:1px solid var(--border-subtle);margin-top:4px;padding-top:4px;
  flex-shrink:0;
}

/* Resizable sections */
.panel-section{
  position:relative;min-height:0;overflow:hidden;
  display:flex;flex-direction:column;
}
#sec-nav{flex:0 0 50px;min-height:50px;}

/* ── ANALYSIS GRAPH (bottom section of sidebar) ── */
#board-layout-analysis{
  flex:0 0 40px;height:40px;max-height:40px;
  display:flex;align-items:stretch;
  min-width:0;overflow:hidden;
}
#board-layout-analysis #eval-graph-wrap{
  width:100%;height:40px;max-height:40px;overflow:hidden;
  background:var(--bg-surface-2);border-radius:var(--r-md);
  padding:2px 4px;
}
#board-layout-analysis canvas{display:block;height:36px!important;max-height:36px!important;}

/* Inner scroller — content overflow scrolls inside the section without resizing it */
.section-scroll{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  padding:6px 2px 8px 2px;scrollbar-gutter:stable;
}
.section-scroll::-webkit-scrollbar{width:5px;}
.section-scroll::-webkit-scrollbar-thumb{background:var(--bg-surface-3);border-radius:var(--r-full);}

/* Scroll hint — fade gradient + chevron at bottom of section, shown only when scrollable */
.scroll-hint{
  position:absolute;left:0;right:0;bottom:0;height:34px;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:center;gap:4px;
  padding-bottom:4px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-tertiary);
  background:linear-gradient(to bottom, rgba(38,36,33,0) 0%, rgba(38,36,33,0.9) 65%, var(--bg-canvas) 100%);
  opacity:0;transition:opacity 200ms;
}
.scroll-hint svg{width:11px;height:11px;animation:hint-bounce 1.6s var(--ease-out) infinite;}
@keyframes hint-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(2px);}}
.panel-section.has-overflow .scroll-hint{opacity:1;}

/* Section divider — draggable */
.h-handle{
  flex:0 0 8px;cursor:row-resize;position:relative;
  background:transparent;
  transition:background 160ms;
}
.h-handle::before{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:42px;height:3px;background:var(--border-default);border-radius:var(--r-full);
  transition:background 160ms,width 160ms,box-shadow 160ms;
}
.h-handle:hover::before,.h-handle.dragging::before{
  background:var(--green-500);width:64px;box-shadow:0 0 8px var(--green-glow);
}

/* ── COMMENTARY (chess.com speech-bubble) ── */
#commentary-card{
  display:flex;align-items:flex-start;gap:0;
  flex-shrink:0;padding:var(--sp2) var(--sp1) 0 var(--sp1);
  position:relative;
}
/* Coach */
.coach-avatar{
  width:64px;height:64px;border-radius:var(--r-full);flex-shrink:0;
  background:#F1F0EE center/cover no-repeat;
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
  position:relative;z-index:2;margin-top:8px;overflow:hidden;
}
.coach-avatar img{width:100%;height:100%;display:block;}

/* The bubble */
.bubble{
  flex:1;min-width:0;background:var(--bg-bubble);color:var(--text-on-bubble);
  border-radius:var(--r-lg);padding:var(--sp3) var(--sp4);margin-left:-10px;
  position:relative;box-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.bubble::before{
  content:'';position:absolute;left:-8px;top:18px;width:14px;height:14px;
  background:var(--bg-bubble);transform:rotate(45deg);border-radius:2px;
}

/* Verdict line: badge · "<san> is <classification>" · score chip */
.verdict-row{
  display:flex;align-items:center;gap:var(--sp2);
  margin-bottom:6px;min-height:24px;
}
.cl-badge{
  width:22px;height:22px;border-radius:var(--r-full);flex-shrink:0;
  background-size:contain;background-repeat:no-repeat;background-position:center;
}
.cl-badge.lg{width:26px;height:26px;}
.verdict-label{
  font-size:15px;font-weight:600;flex:1;min-width:0;line-height:1.3;
  color:var(--text-on-bubble);
}
.verdict-label .san{font-weight:700;}
.verdict-label .verdict-class{font-weight:600;}

.score-chip{
  flex-shrink:0;border-radius:var(--r-sm);padding:3px 8px;
  font-family:var(--font-mono);font-size:12px;font-weight:700;
  background:#3C3936;color:#F5F4F0;
}
.score-chip.pos{background:#3C3936;color:#F5F4F0;}
.score-chip.neg{background:#3C3936;color:#F5F4F0;}
.score-chip.bad{background:#3C3936;color:#F5F4F0;}

/* Body text */
.commentary-text{
  font-size:14px;color:var(--text-on-bubble-2);line-height:1.5;
  word-wrap:break-word;
}
/* keyword pill — matches chess.com's grey rounded chip */
.kw-pill{
  display:inline-block;
  background:#D7D5D1;color:#3D3936;
  padding:0 6px;margin:0 1px;border-radius:6px;
  font-weight:600;font-size:12.5px;
  vertical-align:1px;
  line-height:1.6;
}

/* Engine recommendation — appended INSIDE the bubble */
.refutation-block{
  background:rgba(60,57,54,0.08);border-radius:var(--r-sm);
  padding:var(--sp2) var(--sp3);margin-top:var(--sp2);
}
.refutation-label{font-size:9px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:6px;color:#807A72;}
.refutation-moves{display:flex;flex-wrap:wrap;gap:4px;}
.move-chip{background:#FFF;color:#3D3936;border-radius:6px;padding:3px 7px;
  font-family:var(--font-mono);font-size:11px;font-weight:600;cursor:pointer;
  box-shadow:0 1px 1px rgba(0,0,0,0.08);
  transition:background 120ms,color 120ms;}
.move-chip:hover{background:var(--green-500);color:#1A1A19;}

/* Action row — under the bubble, not inside */
.action-row{display:flex;gap:var(--sp2);margin-top:var(--sp3);padding:0 var(--sp1);}
.btn-secondary{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--btn-secondary-bg);color:var(--text-primary);
  border-radius:var(--r-md);padding:10px 14px;font-size:13px;font-weight:600;
  transition:background 120ms;
}
.btn-secondary:hover{background:var(--bg-surface-3);}
.btn-secondary svg{width:14px;height:14px;color:var(--text-secondary);}
.btn-primary{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--green-500);color:#1A1A19;border-radius:var(--r-md);
  padding:10px 14px;font-size:13px;font-weight:700;box-shadow:var(--shadow-md);
  transition:box-shadow 120ms,filter 120ms;
}
.btn-primary:hover{box-shadow:var(--shadow-glow);filter:brightness(1.05);}
.btn-primary svg{width:14px;height:14px;}

/* Move list — fills #sec-moves */
#move-list-container{
  background:transparent;
  display:flex;flex-direction:column;overflow:hidden;
  flex:1;min-height:0;
}
.ml-header{
  height:36px;min-height:36px;display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp4);border-bottom:1px solid var(--border-subtle);flex-shrink:0;
}
.ml-title{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-tertiary);letter-spacing:.06em;}
.filter-pills{display:flex;gap:3px;}
.filter-pill{border-radius:var(--r-md);padding:2px 7px;font-size:10px;font-weight:600;
  color:var(--text-tertiary);transition:background 120ms,color 120ms;}
.filter-pill:hover{background:var(--bg-surface-2);color:var(--text-primary);}
.filter-pill.active{background:var(--bg-surface-3);color:var(--green-500);}
#move-list{padding:2px 0;overflow-y:auto;flex:1;}
#move-list::-webkit-scrollbar{width:5px;}
#move-list::-webkit-scrollbar-thumb{background:var(--bg-surface-3);border-radius:var(--r-full);}
.move-pair{display:flex;align-items:stretch;border-bottom:1px solid var(--border-subtle);}
.move-pair:last-child{border-bottom:none;}
.move-num{width:28px;display:flex;align-items:center;justify-content:flex-end;padding:0 var(--sp2);
  font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text-tertiary);flex-shrink:0;}
.move-cell{
  flex:1;display:flex;align-items:center;gap:6px;
  padding:5px var(--sp3);cursor:pointer;position:relative;
  border-radius:var(--r-sm);margin:1px;
  transition:background 120ms;
}
.move-cell::before{
  content:'';position:absolute;left:-1px;top:4px;bottom:4px;width:2px;
  background:var(--green-500);border-radius:var(--r-full);opacity:0;
  transition:opacity 240ms;
}
.move-cell:hover{background:var(--bg-surface-2);}
.move-cell.active{background:var(--bg-surface-3);}
.move-cell.active::before{opacity:1;}
.move-san{font-size:13px;font-weight:600;color:var(--text-primary);}
.move-badge{width:14px;height:14px;border-radius:var(--r-full);margin-left:auto;flex-shrink:0;
  background-size:contain;background-repeat:no-repeat;background-position:center;}

/* Navigation controls — bottom of panel, chess.com style */
#nav-bar{
  height:48px;min-height:48px;background:var(--bg-surface-2);border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  gap:var(--sp1);padding:0 var(--sp3);flex-shrink:0;width:100%;
}

/* Move list fills its section */
#sec-moves .ml-header{
  height:32px;min-height:32px;display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp4);border-bottom:1px solid var(--border-subtle);flex-shrink:0;
}
.nav-btn{
  border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
  background:var(--bg-surface-2);color:var(--text-primary);flex-shrink:0;
  transition:background 120ms,transform 80ms;
}
.nav-btn:hover{background:var(--bg-surface-3);}
.nav-btn:active{transform:scale(0.92);}
.nav-btn.sm{width:38px;height:38px;}
.nav-btn.lg{width:46px;height:46px;background:var(--green-500);color:#1A1A19;box-shadow:var(--shadow-md);}
.nav-btn.lg:hover{box-shadow:var(--shadow-glow);filter:brightness(1.05);}
.nav-btn svg{width:18px;height:18px;pointer-events:none;}
#progress-strip{
  flex:1;height:3px;background:var(--border-subtle);border-radius:var(--r-full);
  position:relative;cursor:pointer;margin:0 var(--sp2);
}
#progress-fill{height:100%;background:var(--green-500);border-radius:var(--r-full);transition:width 240ms var(--ease-out);}
.progress-dot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:5px;height:5px;border-radius:var(--r-full);
  border:1px solid var(--bg-canvas);z-index:2;cursor:pointer;
}

/* Empty state */
#empty-state{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:var(--bg-canvas);}
#empty-state.hidden{display:none;}
.empty-inner{display:flex;flex-direction:column;align-items:center;gap:var(--sp4);text-align:center;}
.empty-knight{font-size:120px;opacity:.1;}
.empty-title{font-size:20px;font-weight:700;max-width:380px;line-height:28px;}
.empty-sub{font-size:13px;color:var(--text-secondary);}
.drop-zone{
  width:320px;background:var(--bg-surface);border-radius:var(--r-lg);
  border:2px dashed var(--border-default);padding:var(--sp8);
  display:flex;flex-direction:column;align-items:center;gap:var(--sp3);cursor:pointer;
  transition:border-color 120ms,box-shadow 120ms;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--green-500);box-shadow:0 0 0 4px var(--green-glow);}
.drop-zone-icon{color:var(--text-tertiary);}
.drop-zone-icon svg{width:32px;height:32px;}
.drop-zone-text{font-size:14px;font-weight:600;color:var(--text-secondary);}
.drop-zone-or{font-size:11px;color:var(--text-disabled);text-transform:uppercase;letter-spacing:.06em;}
.btn-browse{background:var(--bg-surface-2);color:var(--text-primary);border-radius:var(--r-md);
  padding:10px 20px;font-size:13px;font-weight:600;transition:background 120ms;}
.btn-browse:hover{background:var(--bg-surface-3);}
#file-input{display:none;}

/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--bg-surface);border:1px solid var(--border-strong);border-radius:var(--r-md);
  padding:var(--sp4);box-shadow:var(--shadow-md);display:flex;align-items:center;gap:var(--sp3);
  z-index:200;transition:transform 240ms var(--ease-out);max-width:360px;
}
#toast.visible{transform:translateX(-50%) translateY(0);}
#toast-bar{position:absolute;bottom:0;left:0;height:2px;background:#D14545;border-radius:0 0 var(--r-md) var(--r-md);}
.toast-icon{color:#D14545;flex-shrink:0;}
.toast-icon svg{width:15px;height:15px;}
#toast-text{font-size:13px;}

/* Animations */
@keyframes fade-up{to{opacity:1;transform:translateY(0);}}
@keyframes badge-pop{0%{transform:scale(0.8);}100%{transform:scale(1);}}
@keyframes badge-over{0%{transform:scale(0);}65%{transform:scale(1.18);}100%{transform:scale(1);}}
@keyframes badge-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes glow-out{0%{opacity:.8;transform:scale(1);}100%{opacity:0;transform:scale(2.5);}}
@keyframes card-out{to{opacity:0;transform:translateY(4px);}}
@keyframes card-in{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.card-out{animation:card-out 100ms var(--ease-out) forwards;}
.card-in{animation:card-in 160ms var(--ease-out) forwards;}

#board-stage{opacity:0;transform:translateY(-6px);animation:fade-up 240ms var(--ease-out) 60ms forwards;}
#review-panel{opacity:0;transform:translateY(-6px);animation:fade-up 240ms var(--ease-out) 130ms forwards;}

@media(max-width:900px){
  #main{grid-template-columns:1fr!important;grid-template-rows:auto auto;overflow-y:auto;padding:8px 10px;height:auto;min-height:0;column-gap:0;}
  #app{height:auto;min-height:100vh;}
  #board-stage{grid-column:1;grid-row:1;order:1;flex-shrink:0;}
  #review-panel{grid-column:1;grid-row:2;order:2;overflow:visible;padding:0;margin-top:12px;height:auto;flex-shrink:0;}
  #board-and-eval{flex:none;}
  #header{padding:0 var(--sp4);flex-shrink:0;}
  .coach-avatar{width:52px;height:52px;}
  .coach-avatar svg{width:38px;height:38px;}
  .verdict-label{font-size:14px;}
  .commentary-text{font-size:13px;}
  #sec-explain,#sec-moves{flex:none;height:auto;min-height:0;}
  .section-scroll{overflow:visible;}
  .scroll-hint{display:none;}
  #move-list{overflow-y:auto;max-height:260px;}
}
@media(max-width:520px){
  .coach-avatar{width:44px;height:44px;}
  .coach-avatar svg{width:32px;height:32px;}
  .bubble{padding:var(--sp3) var(--sp3);}
  .nav-btn.sm{width:36px;height:36px;}
  .nav-btn.lg{width:42px;height:42px;}
  #header{height:48px;min-height:48px;}
  .wordmark{font-size:14px;}
}
</style>
</head>

        <div class="player-rating" id="rating-white"></div>
      </div>

  <!-- DRAG HANDLE -->

<script>
/* ─── STATE ─── */
const S = {
  game:null, moves:[], ply:0, flipped:false,
  playing:false, playTimer:null, filter:'all', chart:null,
  fromSq:null, toSq:null,
};

/* ─── CLASSIFICATION ─── */
const CL = {
  brilliant: {g:'!!',cls:'cl-brilliant',color:'#26C6DA',light:true},
  great:     {g:'!', cls:'cl-great',    color:'#5EBA7D',light:true},
  best:      {g:'★', cls:'cl-best',     color:'#81B64C',light:true},
  excellent: {g:'✓', cls:'cl-excellent',color:'#629B3F',light:false},
  good:      {g:'·', cls:'cl-good',     color:'#7A8A6A',light:false},
  book:      {g:'§', cls:'cl-book',     color:'#9B7FBF',light:false},
  forced:    {g:'↳', cls:'cl-forced',   color:'#5C7A99',light:false},
  inaccuracy:{g:'?!',cls:'cl-inaccuracy',color:'#F4C24A',light:true},
  mistake:   {g:'?', cls:'cl-mistake',  color:'#E89244',light:false},
  blunder:   {g:'??',cls:'cl-blunder',  color:'#D14545',light:false},
  missed_win:{g:'⊘', cls:'cl-missed_win',color:'#D964A0',light:false},
};
const SHOW_BADGE = new Set(['brilliant','great','best','inaccuracy','mistake','blunder','missed_win','forced']);
const ERROR_CL   = new Set(['inaccuracy','mistake','blunder','missed_win']);
const CRIT_CL    = new Set(['brilliant','great','blunder','missed_win']);
const clInfo = l => CL[l] || CL.good;

/* ─── PIECE IMAGES (chess.com Neo theme, 150px) ─── */
const PIECE_URL = 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150';
function applySprite(el, color, type, sz) {
  el.style.backgroundImage = `url('${PIECE_URL}/${color}${type.toLowerCase()}.png')`;
}

/* ─── SOUND ─── */
let _ctx = null;
function audioCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  return _ctx;
}
function playSound(type) {
  try {
    const ctx = audioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const dur   = type === 'capture' ? 0.11 : 0.07;
    const decay = type === 'capture' ? 0.020 : 0.009;
    const buf   = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d     = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*decay));
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = type === 'capture' ? 'bandpass' : 'highpass';
    f.frequency.value = type === 'capture' ? 700 : 1800;
    f.Q.value = 1.4;
    const g = ctx.createGain(); g.gain.value = 0.38;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

/* ─── ANIMATION ─── */
function sq2xy(sq, sz) {
  const file = sq.charCodeAt(0)-97, rank = parseInt(sq[1])-1;
  const col = S.flipped ? 7-file : file;
  const row = S.flipped ? rank : 7-rank;
  return {x:col*sz, y:row*sz};
}
function animPiece(fromSq, toSq, piece, isCapture, done) {
  const wrap = document.getElementById('board-wrap');
  const sz   = wrap.clientWidth / 8;
  const fc   = wrap.querySelector(`[data-sq="${fromSq}"] .piece`);
  if (fc) fc.style.visibility = 'hidden';
  const from = sq2xy(fromSq, sz);
  const to   = sq2xy(toSq, sz);
  const old  = document.getElementById('_anim');
  if (old) old.remove();
  const el = document.createElement('div');
  el.id = '_anim';
  el.style.cssText =
    `position:absolute;width:${sz}px;height:${sz}px;left:${from.x}px;top:${from.y}px;`+
    `background-image:url('${PIECE_URL}/${piece.color}${piece.type.toLowerCase()}.png');`+
    `background-repeat:no-repeat;background-size:100% 100%;`+
    `pointer-events:none;z-index:100;will-change:transform;`+
    `transition:transform 175ms cubic-bezier(0.2,0.8,0.2,1);`;
  wrap.appendChild(el);
  el.getBoundingClientRect();
  el.style.transform = `translate(${to.x-from.x}px,${to.y-from.y}px)`;
  playSound(isCapture ? 'capture' : 'move');
  setTimeout(() => { el.remove(); done(); }, 190);
}

/* ─── BOARD RENDER ─── */
function renderPosition(fen) {
  const grid = document.getElementById('board-grid');
  const wrap = document.getElementById('board-wrap');
  grid.innerHTML = '';
  const sz = wrap.clientWidth / 8;
  let chess;
  try { chess = fen==='start' ? new Chess() : new Chess(fen); }
  catch(e) { chess = new Chess(); }
  const files = S.flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
  const ranks = S.flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];

  // Find king in check
  let checkSq = null;
  if (chess.in_check()) {
    const turn = chess.turn();
    outer: for (const r of [1,2,3,4,5,6,7,8])
      for (const f of ['a','b','c','d','e','f','g','h']) {
        const p = chess.get(f+r);
        if (p && p.type==='k' && p.color===turn) { checkSq=f+r; break outer; }
      }
  }

  // Classification badge info for to-square
  const showBadge = S.ply > 0 && S.moves[S.ply-1];

  for (let ri = 0; ri < 8; ri++) {
    for (let fi = 0; fi < 8; fi++) {
      const sq    = files[fi] + ranks[ri];
      const piece = chess.get(sq);
      const light = (ri+fi) % 2 !== 0;
      const isLM  = sq===S.fromSq || sq===S.toSq;
      const isChk = sq===checkSq;

      const cell = document.createElement('div');
      cell.className = 'board-sq '+(light?'sq-light':'sq-dark')+(isLM?' lm':'')+(isChk?' sq-check':'');
      cell.dataset.sq = sq;

      if (fi===0) { const l=document.createElement('span'); l.className='coord-r'; l.textContent=ranks[ri]; cell.appendChild(l); }
      if (ri===7) { const l=document.createElement('span'); l.className='coord-f'; l.textContent=files[fi]; cell.appendChild(l); }

      if (piece) {
        const el = document.createElement('div');
        el.className = 'piece';
        applySprite(el, piece.color, piece.type, sz);
        cell.appendChild(el);
      }

      // Classification badge on the to-square (chess.com style — image badge)
      if (showBadge && sq === S.toSq) {
        const mv  = S.moves[S.ply-1];
        const cl  = clInfo(mv.classification);
        const bsz = Math.max(16, Math.round(sz * 0.36));
        const badge = document.createElement('div');
        badge.className = `cl-badge ${cl.cls}`;
        const off = Math.max(-Math.round(bsz*0.25), -Math.round(sz*0.06));
        badge.style.cssText =
          `position:absolute;top:${off}px;right:${off}px;`+
          `width:${bsz}px;height:${bsz}px;`+
          `filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4));`+
          `z-index:30;pointer-events:none;`;
        cell.appendChild(badge);
      }

      grid.appendChild(cell);
    }
  }
}

/* ─── BOARD RESIZE ─── */
function resizeBoard() {
  const stage = document.getElementById('board-stage');
  const main  = document.getElementById('main');
  if (!stage || !main) return;
  const EVAL_W  = 18;
  const EVAL_GAP = 8;
  const STRIP_H = 44;
  const STRIP_GAP = 8;
  const mainH = main.clientHeight;

  // Read the board column's actual rendered width directly
  const availW = Math.max(200, stage.clientWidth - EVAL_W - EVAL_GAP - 4);
  const availH = Math.max(200, mainH - STRIP_H * 2 - STRIP_GAP * 2);
  const size   = Math.max(200, Math.min(availW, availH));

  const wrap = document.getElementById('board-wrap');
  const bar  = document.getElementById('eval-bar');
  wrap.style.width  = size + 'px';
  wrap.style.height = size + 'px';
  bar.style.height  = size + 'px';

  const colW = size + EVAL_W + EVAL_GAP;
  document.documentElement.style.setProperty('--board-size', size + 'px');
  document.querySelectorAll('.player-strip').forEach(s => s.style.width = colW + 'px');
}

/* ─── FILE LOADING ─── */
function loadFile(f) {
  if (!f) return;
  if (!f.name.endsWith('.json')) { toast('Please load a .json commentary file.'); return; }
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.moves || !Array.isArray(data.moves)) throw new Error('Missing "moves" array');
      loadGame(data);
    } catch(err) { toast('Could not parse: '+err.message); }
  };
  r.readAsText(f);
}
function loadGame(data) {
  S.game=data; S.moves=data.moves; S.ply=0; S.fromSq=null; S.toSq=null;
  document.getElementById('empty-state').classList.add('hidden');
  populateMeta(); buildMoveList(); buildEvalGraph(); goToPly(0,true);
}

/* ─── META ─── */
function populateMeta() {
  const m = S.game.meta||{};
  const W=m.white||'White', B=m.black||'Black';
  document.getElementById('name-white').textContent = W;
  document.getElementById('name-black').textContent = B;
  document.getElementById('av-white').textContent = W[0].toUpperCase();
  document.getElementById('av-black').textContent = B[0].toUpperCase();
  if (m.white_elo) document.getElementById('rating-white').textContent = '('+m.white_elo+')';
  if (m.black_elo) document.getElementById('rating-black').textContent = '('+m.black_elo+')';
  calcAccuracy();
}
function calcAccuracy() {
  function acc(moves) {
    const eng = moves.filter(m=>m.source!=='book');
    if (!eng.length) return null;
    return Math.round(Math.max(0,(1-eng.reduce((s,m)=>s+(m.ep_loss||0),0)/eng.length*4)*100));
  }
  function show(id,a) {
    const el=document.getElementById(id);
    if (a===null){el.style.display='none';return;}
    el.style.display='';el.textContent=a+'%';
    el.className='acc-badge '+(a>=90?'good':a>=75?'ok':a>=60?'poor':'bad');
  }
  show('acc-white',acc(S.moves.filter(m=>m.color==='white')));
  show('acc-black',acc(S.moves.filter(m=>m.color==='black')));
}

/* ─── PLY NAVIGATION ─── */
function goToPly(ply, skip) {
  const prev = S.ply;
  ply = Math.max(0, Math.min(S.moves.length, ply));
  S.ply = ply;
  if (ply>0) { const u=S.moves[ply-1].uci||''; S.fromSq=u.slice(0,2)||null; S.toSq=u.slice(2,4)||null; }
  else { S.fromSq=null; S.toSq=null; }
  const fen = ply===0?'start':S.moves[ply-1].fen_after;

  // Non-board UI — update immediately
  updateCard(ply); updateEvalBar(ply); updateMLActive(ply);
  updateProgress(ply); updateStrips(ply); updateGraphHead(ply);
  // Reset explain-section scroll so the bubble is always visible at the top
  document.querySelectorAll('.section-scroll').forEach(s => s.scrollTop = 0);
  if (ply>0) document.getElementById('sr-live').textContent=`${S.moves[ply-1].san} ${S.moves[ply-1].classification}`;

  // Animate forward-one moves
  if (!skip && ply===prev+1 && ply>0) {
    const mv=S.moves[ply-1], u=mv.uci||'', fSq=u.slice(0,2), tSq=u.slice(2,4);
    if (fSq && tSq) {
      const pFen = prev===0?null:S.moves[prev-1].fen_after;
      let pc; try{pc=pFen?new Chess(pFen):new Chess();}catch(e){pc=new Chess();}
      const piece=pc.get(fSq), target=pc.get(tSq);
      if (piece) { animPiece(fSq,tSq,piece,!!target,()=>renderPosition(fen)); return; }
    }
  }
  renderPosition(fen);
}
const goPrev=()=>goToPly(S.ply-1);
const goNext=()=>goToPly(S.ply+1);
const goFirst=()=>goToPly(0,true);
const goLast=()=>goToPly(S.moves.length,true);

/* ─── KEYWORD HIGHLIGHTER ─── */
// Words/phrases that get the rounded grey "pill" treatment in the commentary text
// (matches chess.com's style — see ratio_example image).
const KW_REGEX = new RegExp(
  '\\b(' + [
    'hanging','undefended','unprotected',
    'fork','pin','pinned','skewer','skewered','discovered attack','discovered check','double attack',
    'sacrifice','sacrificed','sacrificing',
    'mate(?:[- ]in[- ]\\d+)?','checkmate','stalemate','forced mate','forced',
    'tempo','tempi','initiative','zugzwang',
    'open file','passed pawn','outpost','weak square','weak squares','isolated pawn','doubled pawns','backward pawn',
    'bishop pair','knight outpost','overloaded',
    'check','checks','blockade','blockades','windmill','clearance','deflection','interference','removing the defender'
  ].join('|') + ')\\b',
  'gi'
);
function highlightKeywords(text) {
  if (!text) return '';
  // first escape HTML, then wrap matches
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(KW_REGEX, m => `<span class="kw-pill">${m}</span>`);
}

/* ─── COMMENTARY CARD ─── */
function updateCard(ply) {
  const card = document.getElementById('commentary-card');
  card.classList.add('card-out');
  setTimeout(()=>{card.classList.remove('card-out');renderCard(ply);card.classList.add('card-in');setTimeout(()=>card.classList.remove('card-in'),170);},100);
}
function renderCard(ply) {
  const badge = document.getElementById('main-badge');
  const label = document.getElementById('verdict-label');
  const body  = document.getElementById('commentary-body');
  const chip  = document.getElementById('score-chip');
  removeRefutation();

  if (ply===0||!S.moves.length) {
    badge.className='cl-badge lg cl-best';
    label.innerHTML='Press → or click <strong>Next</strong> to begin'; label.style.color='';
    chip.style.display='none'; body.textContent=''; return;
  }
  const mv=S.moves[ply-1], cl=clInfo(mv.classification);
  badge.className=`cl-badge lg ${cl.cls}`;
  animateBadge(mv.classification);

  // chess.com phrasing: "<san> is a/an/the <classification> [move]"
  const VERDICT_PHRASE = {
    brilliant:  ['is a','brilliant move'],
    great:      ['is a','great move'],
    best:       ['is the','best move'],
    excellent:  ['is an','excellent move'],
    good:       ['is a','good move'],
    inaccuracy: ['is an','inaccuracy'],
    mistake:    ['is a','mistake'],
    blunder:    ['is a','blunder'],
    missed_win: ['','missed a win'],
    forced:     ['was','forced'],
    book:       ['',''],
  };
  const ph = VERDICT_PHRASE[mv.classification] || ['is',mv.classification.replace('_',' ')];
  if (mv.classification === 'book' && mv.opening?.name) {
    label.innerHTML =
      `<span class="san">${mv.san}</span> — <span class="verdict-class" style="color:${cl.color}">${mv.opening.name}</span>`;
  } else {
    label.innerHTML =
      `<span class="san">${mv.san}</span> ${ph[0]} <span class="verdict-class" style="color:${cl.color}">${ph[1]}</span>`;
  }

  // Score chip: chess.com shows eval consistently from White's POV after the move
  const ev=mv.eval_after;
  if (ev && mv.source!=='book') {
    let txt='', pos=true;
    if (ev.mate_in!=null) { txt=`M${Math.abs(ev.mate_in)}`; pos=ev.mate_in>0; }
    else if (ev.cp!=null) {
      const val=ev.cp/100;
      txt=(val>=0?'+':'')+val.toFixed(2); pos=val>=0;
    }
    if (txt) {
      chip.style.display='';
      chip.textContent=txt;
      chip.className='score-chip '+(pos?'pos':(mv.ep_loss||0)>0.4?'bad':'neg');
    } else chip.style.display='none';
  } else chip.style.display='none';

  body.innerHTML = highlightKeywords(mv.commentary || mv.verdict || '—');
  renderRefutation(mv);
  // content changed — re-evaluate whether scroll hint is needed
  setTimeout(updateScrollHints, 0);
}
function animateBadge(label) {
  const b=document.getElementById('main-badge');
  b.style.animation='none'; b.offsetWidth;
  if (label==='brilliant'){ b.style.animation='badge-over 500ms var(--ease-over) forwards'; spawnGlow(b,clInfo(label).color); }
  else if (label==='great'){ b.style.animation='badge-over 400ms var(--ease-over) forwards'; }
  else if (label==='blunder'){ b.style.animation='badge-pop 200ms var(--ease-out) forwards'; setTimeout(()=>{b.style.animation='badge-shake 300ms ease forwards';},200); }
  else { b.style.animation='badge-pop 180ms var(--ease-out) forwards'; }
}
function spawnGlow(el, color) {
  const r=el.getBoundingClientRect(), g=document.createElement('div');
  g.style.cssText=`position:fixed;width:${r.width}px;height:${r.height}px;top:${r.top}px;left:${r.left}px;border-radius:50%;background:${color};pointer-events:none;z-index:999;animation:glow-out 600ms var(--ease-out) forwards;`;
  document.body.appendChild(g); setTimeout(()=>g.remove(),650);
}
function removeRefutation() { document.querySelectorAll('.refutation-block').forEach(e=>e.remove()); }
function renderRefutation(mv) {
  if (!mv.multipv?.length||mv.was_best||mv.classification==='book') return;
  const best=mv.multipv[0]; if (!best?.san) return;
  const block=document.createElement('div'); block.className='refutation-block';
  const lbl=document.createElement('div'); lbl.className='refutation-label'; lbl.textContent='Engine suggestion'; block.appendChild(lbl);
  const row=document.createElement('div'); row.className='refutation-moves';
  [best.san,...(best.pv||[])].slice(0,5).forEach(san=>{
    const c=document.createElement('span'); c.className='move-chip'; c.textContent=san; row.appendChild(c);
  });
  block.appendChild(row);
  // refutation goes inside the bubble, after the body
  document.querySelector('.bubble').appendChild(block);
}

/* ─── EVAL BAR ─── */
function updateEvalBar(ply) {
  const fill=document.getElementById('eval-bar-fill'), lbl=document.getElementById('eval-bar-label');
  let pct=50,txt='0.0';
  if (ply>0) {
    const ev=S.moves[ply-1].eval_after;
    if (ev?.mate_in!=null){ pct=ev.mate_in>0?99:1; txt='M'+Math.abs(ev.mate_in); }
    else if (ev?.win_prob_white!=null){
      pct=ev.win_prob_white*100;
      if (ev.cp!=null){
        const v=Math.abs(ev.cp/100);
        const a=v>=10?Math.round(v).toString():v.toFixed(1);
        txt=ev.cp>=0?a:'-'+a;
      }
    }
  }
  // chess.com convention: white fills FROM TOP DOWN, black bg shows at bottom.
  // When the board is flipped, mirror the bar — white from BOTTOM UP — so the
  // "side at the bottom of the board" matches the "side at the bottom of the bar".
  const flipped = S.flipped;
  if (flipped) { fill.style.top='auto';   fill.style.bottom='0';   }
  else         { fill.style.top='0';      fill.style.bottom='auto';}
  fill.style.height = pct + '%';
  // Label sits inside the WINNER's color region.
  // not flipped + white winning → near top (white area is at top)
  // not flipped + black winning → near bottom (black area is at bottom)
  // flipped     + white winning → near bottom (white area is at bottom)
  // flipped     + black winning → near top (black area is at top)
  const labelAtTop = flipped ? (pct < 50) : (pct > 50);
  lbl.style.top = (labelAtTop ? 4 : 86) + '%';
  // Color: dark on white region, light on dark region. Always pct>50 means white winning,
  // and label always sits in the winner's region, so:
  lbl.style.color = (pct > 50) ? '#1A1A19' : '#F5F4F0';
  lbl.textContent = txt;
}

/* ─── MOVE LIST ─── */
function buildMoveList() {
  const list=document.getElementById('move-list'); list.innerHTML='';
  for (let i=0;i<S.moves.length;i+=2) {
    const wm=S.moves[i], bm=S.moves[i+1];
    const pair=document.createElement('div'); pair.className='move-pair';
    const num=document.createElement('div'); num.className='move-num tabular'; num.textContent=wm.move_number+'.';
    pair.appendChild(num); pair.appendChild(mkCell(wm,i+1)); if(bm)pair.appendChild(mkCell(bm,i+2));
    list.appendChild(pair);
  }
}
function mkCell(mv,ply) {
  const cell=document.createElement('div');
  cell.className='move-cell'; cell.dataset.ply=ply;
  cell.setAttribute('tabindex','0');
  const san=document.createElement('span'); san.className='move-san'; san.textContent=mv.san; cell.appendChild(san);
  if (SHOW_BADGE.has(mv.classification)&&shouldShow(mv)) {
    const cl=clInfo(mv.classification);
    const b=document.createElement('div'); b.className=`move-badge ${cl.cls}`; b.title=mv.classification; cell.appendChild(b);
  }
  cell.addEventListener('click',()=>goToPly(ply,true));
  cell.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')goToPly(ply,true);});
  return cell;
}
function shouldShow(mv) {
  if (S.filter==='errors')   return ERROR_CL.has(mv.classification);
  if (S.filter==='critical') return CRIT_CL.has(mv.classification);
  return true;
}
function updateMLActive(ply) {
  document.querySelectorAll('.move-cell').forEach(c=>c.classList.toggle('active',+c.dataset.ply===ply));
  const a = document.querySelector(`.move-cell[data-ply="${ply}"]`);
  const list = document.getElementById('move-list');
  if (!a || !list || !list.contains(a)) return;
  // Scroll only within the move-list scrollbox — not parent ancestors —
  // so the commentary bubble stays pinned at the top of the explain section.
  const aRect = a.getBoundingClientRect();
  const lRect = list.getBoundingClientRect();
  if (aRect.top < lRect.top) {
    list.scrollTop += aRect.top - lRect.top - 4;
  } else if (aRect.bottom > lRect.bottom) {
    list.scrollTop += aRect.bottom - lRect.bottom + 4;
  }
}

/* ─── PROGRESS ─── */
function buildProgressDots() {
  document.querySelectorAll('.progress-dot').forEach(d=>d.remove());
  const strip=document.getElementById('progress-strip'), tot=S.moves.length;
  S.moves.forEach((mv,i)=>{
    const cl=clInfo(mv.classification), dot=document.createElement('div');
    dot.className='progress-dot'; dot.style.left=((i+1)/tot*100)+'%'; dot.style.background=cl.color;
    dot.title=`${mv.san} — ${mv.classification}`;
    dot.addEventListener('click',e=>{e.stopPropagation();goToPly(i+1,true);});
    strip.appendChild(dot);
  });
}
function updateProgress(ply) {
  document.getElementById('progress-fill').style.width=(S.moves.length?(ply/S.moves.length*100):0)+'%';
}

/* ─── PLAYER STRIPS ─── */
function updateStrips(ply) {
  const w=document.getElementById('strip-white'),b=document.getElementById('strip-black');
  if (!ply){w.classList.remove('active');b.classList.remove('active');return;}
  const mv=S.moves[ply-1];
  w.classList.toggle('active',mv.color==='white'); b.classList.toggle('active',mv.color==='black');
}

/* ─── EVAL GRAPH ─── */
function buildEvalGraph() {
  if (S.chart){S.chart.destroy();S.chart=null;}
  const canvas=document.getElementById('eval-graph');
  canvas.style.height='36px'; canvas.height=36;
  const ctx=canvas.getContext('2d');
  const data=S.moves.map(m=>m.eval_after?.win_prob_white??0.5);
  const ptC=S.moves.map(m=>clInfo(m.classification).color);
  const ptS=S.moves.map(m=>(m.classification==='brilliant'||m.classification==='great')?6:3);
  const gr=ctx.createLinearGradient(0,0,0,90);
  gr.addColorStop(0,'rgba(245,244,240,0.75)'); gr.addColorStop(1,'rgba(61,59,55,0.15)');
  S.chart=new Chart(ctx,{type:'line',data:{labels:S.moves.map((_,i)=>i+1),datasets:[{
    data,fill:true,backgroundColor:gr,borderColor:'rgba(245,244,240,0.22)',borderWidth:1,tension:0.35,
    pointBackgroundColor:ptC,pointBorderColor:'#1A1A19',pointBorderWidth:1,pointRadius:ptS,pointHoverRadius:6,
  }]},options:{
    responsive:true,maintainAspectRatio:false,animation:{duration:0},
    plugins:{legend:{display:false},tooltip:{
      callbacks:{
        title:c=>{const m=S.moves[c[0].dataIndex];return`${m.move_number}.${m.color==='white'?'':'..'}${m.san}`;},
        label:c=>S.moves[c.dataIndex].classification,
      },
      backgroundColor:'#312F2C',titleColor:'#F5F4F0',bodyColor:'#B8B3A8',
      borderColor:'rgba(255,255,255,0.09)',borderWidth:1,cornerRadius:8,
    }},
    scales:{x:{display:false},y:{display:false,min:0,max:1}},
    onClick:(e,els)=>{if(els.length)goToPly(els[0].index+1,true);}
  }});
  buildProgressDots();
}
function updateGraphHead(ply) {
  if (!S.chart||!S.moves.length) return;
  S.chart.data.datasets[0].pointRadius=S.moves.map((m,i)=>{
    const base=(m.classification==='brilliant'||m.classification==='great')?6:3;
    return i+1===ply?8:base;
  });
  S.chart.update('none');
}

/* ─── BEST MOVE ─── */
function showBest() {
  if (!S.ply||S.ply>S.moves.length) return;
  const mv=S.moves[S.ply-1];
  if (!mv.best_move?.san) return;
  const b=document.getElementById('commentary-body'), orig=b.textContent;
  b.textContent='Best: '+mv.best_move.san;
  setTimeout(()=>b.textContent=orig,2500);
}

/* ─── AUTOPLAY ─── */
function togglePlay() {
  if (!S.moves.length) return;
  S.playing=!S.playing;
  document.getElementById('play-icon').style.display=S.playing?'none':'';
  document.getElementById('pause-icon').style.display=S.playing?'':'none';
  if (S.playing){if(S.ply>=S.moves.length)goFirst();tick();}
  else clearTimeout(S.playTimer);
}
function tick() {
  if (!S.playing) return;
  S.playTimer=setTimeout(()=>{
    if (S.ply>=S.moves.length){S.playing=false;document.getElementById('play-icon').style.display='';document.getElementById('pause-icon').style.display='none';return;}
    goNext();tick();
  },1200);
}

/* ─── FLIP ─── */
function flipBoard() {
  S.flipped=!S.flipped;
  renderPosition(S.ply===0?'start':S.moves[S.ply-1].fen_after);
  updateEvalBar(S.ply);
  document.getElementById('btn-flip').style.transform=S.flipped?'rotate(180deg)':'';
}

/* ─── FILTER ─── */
function setFilter(f) {
  S.filter=f;
  document.querySelectorAll('.filter-pill').forEach(el=>el.classList.toggle('active',el.dataset.filter===f));
  buildMoveList(); updateMLActive(S.ply);
}

/* ─── TOAST ─── */
let _tt;
function toast(msg) {
  const t=document.getElementById('toast'); document.getElementById('toast-text').textContent=msg;
  t.classList.add('visible');
  const b=document.getElementById('toast-bar'); b.style.transition='none';b.style.width='100%';
  setTimeout(()=>{b.style.transition='width 6s linear';b.style.width='0%';},50);
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('visible'),6000);
}

/* ─── DRAG & DROP ─── */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragenter',e=>{e.stopPropagation();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');loadFile(e.dataTransfer.files[0]);});
dz.addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('btn-browse').addEventListener('click',e=>{e.stopPropagation();document.getElementById('file-input').click();});
document.getElementById('file-input').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);e.target.value='';});

/* ─── KEYBOARD ─── */
document.addEventListener('keydown',e=>{
  if (!S.moves.length) return;
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  switch(e.key){
    case 'ArrowRight':e.preventDefault();goNext();break;
    case 'ArrowLeft':e.preventDefault();goPrev();break;
    case 'Home':e.preventDefault();goFirst();break;
    case 'End':e.preventDefault();goLast();break;
    case ' ':e.preventDefault();togglePlay();break;
    case 'f':case 'F':flipBoard();break;
    case 'b':case 'B':showBest();break;
  }
});

/* ─── BUTTONS ─── */
document.getElementById('pb-first').addEventListener('click',goFirst);
document.getElementById('pb-prev').addEventListener('click',goPrev);
document.getElementById('pb-play').addEventListener('click',togglePlay);
document.getElementById('pb-next').addEventListener('click',goNext);
document.getElementById('pb-last').addEventListener('click',goLast);
document.getElementById('btn-next-card').addEventListener('click',goNext);
document.getElementById('btn-best').addEventListener('click',showBest);
document.getElementById('btn-flip').addEventListener('click',flipBoard);
document.getElementById('btn-export').addEventListener('click',()=>{
  if (!S.game) return;
  const m=S.game.meta||{};
  let pgn=`[White "${m.white||'White'}"]\n[Black "${m.black||'Black'}"]\n[Result "${m.result||'*'}"]\n\n`;
  pgn+=S.moves.map(mv=>(mv.color==='white'?mv.move_number+'. ':'')+mv.san).join(' ');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([pgn],{type:'text/plain'}));
  a.download='game.pgn'; a.click();
});
document.getElementById('progress-strip').addEventListener('click',e=>{
  if (!S.moves.length) return;
  const r=e.currentTarget.getBoundingClientRect();
  goToPly(Math.round((e.clientX-r.left)/r.width*S.moves.length),true);
});
document.getElementById('board-wrap').addEventListener('dblclick',flipBoard);
document.querySelectorAll('.filter-pill').forEach(p=>p.addEventListener('click',()=>setFilter(p.dataset.filter)));

/* ─── SCROLL-HINT DETECTION ─── */
function updateScrollHints() {
  document.querySelectorAll('.panel-section').forEach(sec => {
    const inner = sec.querySelector('.section-scroll');
    if (!inner) { sec.classList.remove('has-overflow'); return; }
    const overflow = inner.scrollHeight - inner.clientHeight - 1;
    const remaining = overflow - inner.scrollTop;
    sec.classList.toggle('has-overflow', overflow > 0 && remaining > 8);
  });
}
document.addEventListener('scroll', e => {
  if (e.target.classList && e.target.classList.contains('section-scroll')) updateScrollHints();
}, true);



resizeBoard();
renderPosition('start');
updateScrollHints();
window.addEventListener('resize',()=>{
  resizeBoard();
  renderPosition(S.ply===0?'start':(S.moves[S.ply-1]?.fen_after||'start'));
  if (S.chart) S.chart.resize();
  updateScrollHints();
});
</script>
